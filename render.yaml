services:
  - type: web
    name: auditing-sampling-toolkit
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: mkdir -p data && gunicorn --chdir app/backend app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DB_PATH
        value: data/audit_sampling.sqlite3
